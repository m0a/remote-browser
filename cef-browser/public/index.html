<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>CEF Remote Browser</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="tab-bar">
    <div id="tabs"></div>
    <button id="tab-new" class="tab-btn" aria-label="New tab">+</button>
  </div>
  <div id="toolbar">
    <button id="btn-back" class="tb-btn" aria-label="Back">&#x276E;</button>
    <button id="btn-forward" class="tb-btn" aria-label="Forward">&#x276F;</button>
    <button id="btn-reload" class="tb-btn" aria-label="Reload">&#x21BB;</button>
    <form id="url-form">
      <input id="url-input" type="url" placeholder="URL" autocomplete="off" autocapitalize="off" spellcheck="false">
    </form>
  </div>
  <canvas id="screen" tabindex="0"></canvas>
  <div id="status">Connecting...</div>
  <div id="dialog-overlay"></div>
  <div id="debug-info"></div>
  <button id="kb-toggle" aria-label="Toggle keyboard">&#x2328;</button>
  <input id="hidden-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false" enterkeyhint="go">
  <script src="app.js"></script>
</body>
</html>
